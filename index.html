<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ECHO CORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00ff66;
            --text-color: #ffffff;
            --panel-bg: rgba(20, 20, 20, 0.6);
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto, Helvetica, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 30, 30, 0.5) 0%, transparent 70%);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        /* Анимация появления */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .core-wrapper {
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 10px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 4px;
            font-weight: 700;
        }

        /* Премиальная стеклянная панель */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .input-label {
            font-size: 11px;
            font-weight: 800;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        textarea {
            width: 100%;
            height: 130px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            color: #fff;
            font-size: 16px;
            line-height: 1.4;
            resize: none;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        textarea:focus {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(10, 10, 10, 0.8);
        }

        textarea::placeholder {
            color: #333;
        }

        /* Дофаминовая кнопка с пульсацией */
        .action-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .action-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 60%);
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.3s, transform 0.3s;
        }

        .action-btn:active {
            transform: scale(0.96);
            background: #e0e0e0;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* Кинематографичный лоадер */
        .loader-container {
            display: none;
            justify-content: center;
            align-items: center;
            height: 56px; /* Высота кнопки для плавного перехода */
            margin-top: 24px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="core-wrapper">
        <header>
            <div class="logo">Echo Core</div>
            <div class="subtitle">Neural Architecture</div>
        </header>

        <div class="glass-panel">
            <label class="input-label" for="idea-text">Питч / Идея Контента</label>
            <textarea id="idea-text" placeholder="Опиши механику или хук, который должен завируситься..."></textarea>
            
            <button class="action-btn" id="submit-btn" onclick="processData()">Сканировать</button>
            
            <div class="loader-container" id="loader-block">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        tg.ready();
        
        // Устанавливаем черный цвет для хедера Телеграма, чтобы интерфейс сливался с приложением
        tg.setHeaderColor('#050505'); 
        tg.setBackgroundColor('#050505');

        function processData() {
            const textInput = document.getElementById('idea-text').value.trim();
            const btn = document.getElementById('submit-btn');
            const loader = document.getElementById('loader-block');

            if (textInput === "") {
                // Встроенная вибрация телефона при ошибке
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Архитектура пуста. Введи данные для сканирования.");
                return;
            }

            // Тактильный отклик при успешном нажатии
            tg.HapticFeedback.impactOccurred('heavy');

            // Плавный переход в режим загрузки
            btn.style.display = 'none';
            loader.style.display = 'flex';

            // Упаковка и отправка данных в Python
            const payload = {
                user_idea: textInput
            };
            
            tg.sendData(JSON.stringify(payload));
            
            setTimeout(() => {
                tg.close();
            }, 150);
        }
    </script>
</body>
</html>
